name: 💡 Feature request
description: Propose a new feature or enhancement for this CLI tool.
title: '[FEATURE] '
labels: ['enhancement']
assignees: ['nhankyjangchan']
body:
    - type: markdown
      id: feature_request-header
      attributes:
          value: ⚠️ **Before filling this form**, please ensure you've read the [documentation](https://github.com/nhankyjangchan/project-structure-generator) and searched for [existing issues](https://github.com/nhankyjangchan/project-structure-generator/issues).

    - type: textarea
      id: problem_description
      attributes:
          label: Is your feature request related to a problem? Please describe
          description: A clear and concise description of what the problem is.
          placeholder: I'm always frustrated when [...]
      validations:
          required: true

    - type: textarea
      id: problem_solution
      attributes:
          label: Describe the solution you'd like
          description: A clear and concise description of what you want to happen.
          placeholder: It would be great if the tool could [...]
      validations:
          required: true

    - type: dropdown
      id: feature_scope
      attributes:
          label: Feature scope
          description: What part of the tool would this enhance?
          multiple: false
          options:
              - New flag/option
              - New template file
              - Project structure changes
              - Interactive mode
              - Configuration file support
              - Other (describe in additional context)
      validations:
          required: false

    - type: textarea
      id: feature_description
      attributes:
          label: Describe features or alternatives you've considered
          description: A clear and concise description of any alternative solutions or features you've considered.
          placeholder: I've tried to work around this by [...], but it's not ideal because [...]
      validations:
          required: false

    - type: textarea
      id: feature_context
      attributes:
          label: Additional context
          description: Add any other context about the feature request here.
          placeholder: Paste links, references, or examples here...
      validations:
          required: false

    - type: markdown
      id: feature_request-footer
      attributes:
          value: 💙 Thanks for helping improve this tool!
